# ============================================================================
# 本地源码构建专用 compose 文件
#
#   docker compose -f deploy/docker-compose.yml up --build -d
#
# Dockerfile 内置 node:20 + go 多阶段构建 — npm install/build 都在镜像内完成，
# 宿主机无需 Node 环境，也不用先跑任何 npm 命令。
# ============================================================================

services:
  kwrtmgrd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: kwrt-net-manager:${VERSION:-dev}
    container_name: kwrtmgrd
    restart: unless-stopped
    # host network is recommended for frpc so that xtcp / NAT hole
    # punching works correctly. Switch to bridge if you only need plain
    # tcp/http proxies and want stricter isolation.
    network_mode: host
    environment:
      KWRTNET_API_TOKEN: ${KWRTNET_API_TOKEN:?api token required (set in .env)}
      KWRTNET_HTTP_ADDR: ":${KWRTNET_HTTP_PORT:-18080}"
      KWRTNET_CORS_ORIGINS: ${KWRTNET_CORS_ORIGINS:-*}
      KWRTNET_LOG_LEVEL: ${KWRTNET_LOG_LEVEL:-info}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/usr/local/bin/kwrtmgrd", "health", "-addr", "http://127.0.0.1:${KWRTNET_HTTP_PORT:-18080}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
