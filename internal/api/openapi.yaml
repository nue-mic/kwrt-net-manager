openapi: 3.1.0
info:
  title: KWRT 网络管理 API
  description: |
    KWRT 网络管理守护进程（kwrtmgrd）—— 仿爱快的 DHCP 与静态路由管理。
    后端通过可插拔后端落地：OpenWrt 上走 UCI/dnsmasq/ip（uci 后端），
    开发/非 OpenWrt 环境走 JSON 文件 + 模拟租约（store 后端）。
    所有领域 JSON 均为 snake_case。实时变更经 WebSocket /api/v1/events 推送。
  version: 2.0.0
servers:
  - url: http://localhost:18080
security:
  - BearerAuth: []
tags:
  - name: system
  - name: dhcp-server
  - name: dhcp-static
  - name: dhcp-lease
  - name: dhcp-acl
  - name: route
  - name: netcfg
  - name: backup

paths:
  /api/v1/health:
    get:
      tags: [system]
      summary: 存活探针（无需鉴权）
      security: []
      responses:
        "200": { description: OK }

  /api/v1/version:
    get:
      tags: [system]
      summary: 守护进程版本
      responses:
        "200": { description: OK }

  /api/v1/netcfg/status:
    get:
      tags: [netcfg]
      summary: 网络配置服务状态（后端类型 / DHCP 健康 / pending）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Status" }

  /api/v1/interfaces:
    get:
      tags: [netcfg]
      summary: L3 接口列表（服务接口 / 线路下拉源）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Interface" }

  /api/v1/nics:
    get:
      tags: [netcfg]
      summary: 物理网卡清单（网卡列表）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/NIC" }

  /api/v1/nics/{name}:
    get:
      tags: [netcfg]
      summary: 单块网卡综合详情（sysfs + ip + 尽力而为 ethtool）
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NICDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/netcfg/overview:
    get:
      tags: [netcfg]
      summary: 内外网设置总览（WAN/LAN 计数 + 列表）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetOverview" }

  /api/v1/ifaces:
    get:
      tags: [netcfg]
      summary: 已配置的 LAN/WAN 接口列表
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/NetIface" }
    post:
      tags: [netcfg]
      summary: 新增 LAN/WAN 接口
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NetIface" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetIface" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/ifaces/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [netcfg]
      summary: 取单个接口
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetIface" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [netcfg]
      summary: 更新接口
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NetIface" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetIface" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [netcfg]
      summary: 删除接口
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/ifaces/{id}/action:
    post:
      tags: [netcfg]
      summary: WAN 拨号动作（connect/disconnect/restart）
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [connect, disconnect, restart] }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/servers:
    get:
      tags: [dhcp-server]
      summary: DHCP 服务端列表
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DHCPServer" }
    post:
      tags: [dhcp-server]
      summary: 新增 DHCP 服务端
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DHCPServer" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DHCPServer" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/dhcp/servers/batch:
    post:
      tags: [dhcp-server]
      summary: 批量启用/停用/删除
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BatchReq" }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/servers/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [dhcp-server]
      summary: 取单个 DHCP 服务端
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DHCPServer" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [dhcp-server]
      summary: 更新 DHCP 服务端
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DHCPServer" }
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [dhcp-server]
      summary: 删除 DHCP 服务端
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/dhcp/servers/{id}/toggle:
    post:
      tags: [dhcp-server]
      summary: 启用/停用
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToggleReq" }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/restart:
    post:
      tags: [dhcp-server]
      summary: 重启 DHCP 服务
      responses:
        "200": { description: OK }

  /api/v1/dhcp/route-push:
    put:
      tags: [dhcp-server]
      summary: 设置"静态路由下发到客户端"模式（off|all|tagged）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode: { type: string, enum: [off, all, tagged] }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/statics:
    get:
      tags: [dhcp-static]
      summary: DHCP 静态分配列表（含 arp_bind 全局开关）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/StaticLease" }
                  arp_bind: { type: boolean }
    post:
      tags: [dhcp-static]
      summary: 新增静态分配
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StaticLease" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/dhcp/statics/batch:
    post:
      tags: [dhcp-static]
      summary: 批量启用/停用/删除
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BatchReq" }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/statics/arp-bind:
    put:
      tags: [dhcp-static]
      summary: 设置“兼容 ARP 绑定到静态分配”全局开关
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToggleReq" }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/statics/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    put:
      tags: [dhcp-static]
      summary: 更新静态分配
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StaticLease" }
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [dhcp-static]
      summary: 删除静态分配
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/dhcp/statics/{id}/toggle:
    post:
      tags: [dhcp-static]
      summary: 启用/停用
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToggleReq" }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/leases:
    get:
      tags: [dhcp-lease]
      summary: DHCP 终端列表（活动租约，只读）
      parameters:
        - { name: interface, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [static, dynamic] } }
        - { name: q, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Lease" }

  /api/v1/dhcp/leases/reserve:
    post:
      tags: [dhcp-lease]
      summary: 加入静态分配（从租约提升为保留）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip, mac]
              properties:
                ip: { type: string }
                mac: { type: string }
                hostname: { type: string }
                interface: { type: string }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/dhcp/leases/blacklist:
    post:
      tags: [dhcp-lease]
      summary: 加入 MAC 黑名单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac]
              properties:
                mac: { type: string }
                remark: { type: string }
      responses:
        "201": { description: Created }

  /api/v1/dhcp/leases/fix-subnet:
    post:
      tags: [dhcp-lease]
      summary: 一键固定同网段（批量把动态租约转保留）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                interface: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { added: { type: integer } }

  /api/v1/dhcp/acl:
    get:
      tags: [dhcp-acl]
      summary: DHCP 黑白名单
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ACL" }

  /api/v1/dhcp/acl/mode:
    put:
      tags: [dhcp-acl]
      summary: 切换黑/白名单模式
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [blacklist, whitelist] }
      responses:
        "200": { description: OK }

  /api/v1/dhcp/acl/entries:
    post:
      tags: [dhcp-acl]
      summary: 新增名单条目
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ACLEntry" }
      responses:
        "201": { description: Created }

  /api/v1/dhcp/acl/entries/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    put:
      tags: [dhcp-acl]
      summary: 更新名单条目
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ACLEntry" }
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [dhcp-acl]
      summary: 删除名单条目
      responses:
        "200": { description: OK }

  /api/v1/dhcp/acl/entries/{id}/toggle:
    post:
      tags: [dhcp-acl]
      summary: 启用/停用名单条目
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK }

  /api/v1/routes:
    get:
      tags: [route]
      summary: 静态路由列表
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Route" }
    post:
      tags: [route]
      summary: 新增静态路由
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Route" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/routes/batch:
    post:
      tags: [route]
      summary: 批量启用/停用/删除
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BatchReq" }
      responses:
        "200": { description: OK }

  /api/v1/routes/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [route]
      summary: 取单条路由
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [route]
      summary: 更新路由
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Route" }
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [route]
      summary: 删除路由
      responses:
        "200": { description: OK }

  /api/v1/routes/{id}/toggle:
    post:
      tags: [route]
      summary: 启用/停用
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToggleReq" }
      responses:
        "200": { description: OK }

  /api/v1/routes/{id}/duplicate:
    post:
      tags: [route]
      summary: 复制路由
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "201": { description: Created }

  /api/v1/route-table:
    get:
      tags: [route]
      summary: 当前路由表（实时内核路由，只读）
      parameters:
        - { name: family, in: query, schema: { type: string, enum: [ipv4, ipv6] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  family: { type: string }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/RouteEntry" }

  /api/v1/export/all:
    get:
      tags: [backup]
      summary: 导出全部（meta + 网络配置 zip）
      responses:
        "200": { description: zip 下载 }

  /api/v1/import/zip:
    post:
      tags: [backup]
      summary: 导入备份 zip
      responses:
        "200": { description: OK }

  /api/v1/events:
    get:
      tags: [system]
      summary: WebSocket 事件流（dhcp/static/lease/acl/route 变更）
      responses:
        "101": { description: Switching Protocols }

  /api/v1/logs/{source}:
    get:
      tags: [logs]
      summary: 日志中心查询（source=system|dhcp|dialup|ddns|operation|arp）
      parameters:
        - { name: source, in: path, required: true, schema: { type: string, enum: [system, dhcp, dialup, ddns, operation, arp] } }
        - { name: start, in: query, schema: { type: integer }, description: unix 秒 }
        - { name: end, in: query, schema: { type: integer }, description: unix 秒 }
        - { name: keyword, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  items: { type: array, items: { $ref: "#/components/schemas/LogEntry" } }
  /api/v1/logs/{source}/export:
    get:
      tags: [logs]
      summary: 导出日志为纯文本（应用当前过滤）
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: 文本下载 }
  /api/v1/logs/{source}/clear:
    post:
      tags: [logs]
      summary: 清空日志（仅 operation/arp 等本工具自管源）
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK }

  /api/v1/ddns:
    get:
      tags: [ddns]
      summary: 动态域名列表（ddns-scripts）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/DDNSEntry" } }
    post:
      tags: [ddns]
      summary: 新增动态域名
      requestBody:
        content: { application/json: { schema: { $ref: "#/components/schemas/DDNSEntry" } } }
      responses:
        "200": { description: OK }
  /api/v1/ddns/batch:
    post:
      tags: [ddns]
      summary: 批量启用/停用/删除
      responses:
        "200": { description: OK }
  /api/v1/ddns/{id}:
    put:
      tags: [ddns]
      summary: 编辑动态域名
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
    delete:
      tags: [ddns]
      summary: 删除动态域名
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
  /api/v1/ddns/{id}/toggle:
    post:
      tags: [ddns]
      summary: 启用/停用
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
  /api/v1/ddns/service:
    get:
      tags: [ddns]
      summary: DDNS 组件探测（是否已装 / 支持的服务商）
      responses:
        "200": { description: OK }
  /api/v1/ddns/install:
    post:
      tags: [ddns]
      summary: 一键安装 ddns-scripts（自愈回退源）
      responses:
        "200": { description: OK }

  /api/v1/speedtest/status:
    get:
      tags: [speedtest]
      summary: 测速运行态 / 最近结果
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SpeedtestStatus" }
  /api/v1/speedtest/run:
    post:
      tags: [speedtest]
      summary: 起一次线路测速（speedtest-go，异步）
      responses:
        "200": { description: OK }
  /api/v1/speedtest/service:
    get:
      tags: [speedtest]
      summary: 测速组件探测（是否已装 speedtest-go）
      responses:
        "200": { description: OK }
  /api/v1/speedtest/install:
    post:
      tags: [speedtest]
      summary: 一键安装 speedtest-go（自愈回退源）
      responses:
        "200": { description: OK }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  responses:
    BadRequest:
      description: 参数校验失败
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
    ToggleReq:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
    BatchReq:
      type: object
      required: [action, ids]
      properties:
        action: { type: string, enum: [enable, disable, delete] }
        ids:
          type: array
          items: { type: string }
    Status:
      type: object
      properties:
        backend: { type: string, enum: [uci, store] }
        dhcp_ok: { type: boolean }
        enabled_servers: { type: integer }
        pending: { type: boolean }
        message: { type: string }
    Interface:
      type: object
      properties:
        name: { type: string }
        ipv4: { type: string }
        netmask: { type: string }
        prefix: { type: integer }
        up: { type: boolean }
    CustomOption:
      type: object
      properties:
        code: { type: integer }
        value: { type: string }
        type: { type: string }
    DHCPServer:
      type: object
      properties:
        id: { type: string }
        interface: { type: string }
        enabled: { type: boolean }
        ip_start: { type: string }
        ip_end: { type: string }
        force: { type: boolean }
        netmask: { type: string }
        gateway: { type: string }
        dns_primary: { type: string }
        dns_secondary: { type: string }
        lease_minutes: { type: integer }
        exclude:
          type: array
          items: { type: string }
        custom_options:
          type: array
          items: { $ref: "#/components/schemas/CustomOption" }
        remaining: { type: integer, readOnly: true }
    StaticLease:
      type: object
      properties:
        id: { type: string }
        hostname: { type: string }
        ip: { type: string }
        mac: { type: string }
        gateway: { type: string }
        interface: { type: string }
        dns_primary: { type: string }
        dns_secondary: { type: string }
        remark: { type: string }
        enabled: { type: boolean }
        route_push: { type: boolean }
    Lease:
      type: object
      properties:
        hostname: { type: string }
        ip: { type: string }
        mac: { type: string }
        expiry: { type: integer }
        remaining_seconds: { type: integer }
        interface: { type: string }
        static: { type: boolean }
        remark: { type: string }
    ACLEntry:
      type: object
      properties:
        id: { type: string }
        mac: { type: string }
        remark: { type: string }
        enabled: { type: boolean }
    ACL:
      type: object
      properties:
        mode: { type: string, enum: [blacklist, whitelist] }
        entries:
          type: array
          items: { $ref: "#/components/schemas/ACLEntry" }
    Route:
      type: object
      properties:
        id: { type: string }
        family: { type: string, enum: [ipv4, ipv6] }
        interface: { type: string }
        target: { type: string }
        netmask: { type: string }
        prefix: { type: integer }
        gateway: { type: string }
        metric: { type: integer }
        remark: { type: string }
        enabled: { type: boolean }
        push_to_clients: { type: boolean }
    RouteEntry:
      type: object
      properties:
        interface: { type: string }
        target: { type: string }
        netmask: { type: string }
        gateway: { type: string }
        metric: { type: integer }
    DNSSettings:
      type: object
      properties:
        enabled: { type: boolean }
        dns_primary: { type: string }
        dns_secondary: { type: string }
        no_resolv: { type: boolean }
        filter_aaaa: { type: boolean }
        cache_size: { type: integer }
        local_ttl: { type: integer }
        min_cache_ttl: { type: integer }
        max_cache_ttl: { type: integer }
        force_proxy: { type: boolean }
    DNSDoH:
      type: object
      properties:
        enabled: { type: boolean }
        resolver_url: { type: string }
        listen_port: { type: integer }
        bootstrap_dns: { type: string }
    DNSRecord:
      type: object
      properties:
        id: { type: string }
        domain: { type: string }
        record_type: { type: string, enum: [A, AAAA] }
        address: { type: string }
        wildcard: { type: boolean }
        src_ip_scope: { type: string }
        remark: { type: string }
        enabled: { type: boolean }
    DNSDomainRoute:
      type: object
      properties:
        id: { type: string }
        domain: { type: string }
        server: { type: string }
        out_iface: { type: string }
        remark: { type: string }
        enabled: { type: boolean }
    DNSCacheStats:
      type: object
      properties:
        supported: { type: boolean }
        cache_size: { type: integer }
        insertions: { type: integer }
        evictions: { type: integer }
        hits: { type: integer }
        misses: { type: integer }
        hit_ratio: { type: number }
    DNSSvcInfo:
      type: object
      properties:
        backend: { type: string }
        filter_aaaa_supported: { type: boolean }
        doh_installed: { type: boolean }
        pkg_manager: { type: string }
        can_install: { type: boolean }
    LogEntry:
      type: object
      properties:
        time: { type: string }
        ts: { type: integer }
        level: { type: string }
        proc: { type: string }
        message: { type: string }
        type: { type: string }
        iface: { type: string }
        mac: { type: string }
        ip: { type: string }
        user: { type: string }
        client_ip: { type: string }
        module: { type: string }
        action: { type: string }
    DDNSEntry:
      type: object
      properties:
        id: { type: string }
        provider: { type: string }
        domain: { type: string }
        auth_mode: { type: string, enum: [token, userpass] }
        username: { type: string }
        password: { type: string }
        ip_source: { type: string, enum: [web, network] }
        interface: { type: string }
        record_type: { type: string, enum: [A, AAAA] }
        enabled: { type: boolean }
        remark: { type: string }
        last_result: { type: string }
        current_ip: { type: string }
        last_update: { type: string }
    SpeedtestStatus:
      type: object
      properties:
        running: { type: boolean }
        error: { type: string }
        started_at: { type: string }
        finished_at: { type: string }
        result:
          type: object
          properties:
            download_mbps: { type: number }
            upload_mbps: { type: number }
            ping_ms: { type: number }
            server: { type: string }
            isp: { type: string }
    NetIface:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string, enum: [lan, wan] }
        proto: { type: string, enum: [static, dhcp, pppoe] }
        device: { type: string }
        ports:
          type: array
          items: { type: string }
        ipaddr: { type: string }
        netmask: { type: string }
        gateway: { type: string }
        dns_primary: { type: string }
        dns_secondary: { type: string }
        username: { type: string }
        password: { type: string }
        service: { type: string }
        ac: { type: string }
        mtu: { type: integer }
        default_gw: { type: boolean }
        clone_mac: { type: string }
        remark: { type: string }
        extra_addrs:
          type: array
          items: { $ref: "#/components/schemas/IfaceAddr" }
        metric: { type: integer }
        peerdns: { type: boolean, nullable: true }
        broadcast: { type: string }
        force_link: { type: boolean, nullable: true }
        auto: { type: boolean, nullable: true }
        ip6assign: { type: integer }
        ip6hint: { type: string }
        ip6gw: { type: string }
        ip6prefix: { type: string }
        ip6ifaceid: { type: string }
        keepalive: { type: string }
        pppoe_ipv6: { type: boolean, nullable: true }
        up: { type: boolean, readOnly: true }
        runtime_ip: { type: string, readOnly: true }
    IfaceAddr:
      type: object
      properties:
        address: { type: string }
        prefix: { type: integer }
        family: { type: string, enum: [ipv4, ipv6] }
        remark: { type: string }
        enabled: { type: boolean }
    NIC:
      type: object
      properties:
        name: { type: string }
        mac: { type: string }
        up: { type: boolean }
        running: { type: boolean }
        speed_mb: { type: integer }
        duplex: { type: string }
        mtu: { type: integer }
        kind: { type: string, enum: [physical, bridge, vlan, wifi, virtual] }
        bound: { type: string }
        role: { type: string, enum: [lan, wan, ""] }
        rx_bytes: { type: integer }
        tx_bytes: { type: integer }
        ip_addrs:
          type: array
          items: { type: string }
    NICAddr:
      type: object
      properties:
        family: { type: string, enum: [ipv4, ipv6] }
        address: { type: string }
        prefix: { type: integer }
        scope: { type: string }
    NICStats:
      type: object
      properties:
        rx_bytes: { type: integer }
        tx_bytes: { type: integer }
        rx_packets: { type: integer }
        tx_packets: { type: integer }
        rx_errors: { type: integer }
        tx_errors: { type: integer }
        rx_dropped: { type: integer }
        tx_dropped: { type: integer }
        multicast: { type: integer }
        collisions: { type: integer }
    NICDetail:
      type: object
      description: 单块网卡的综合详情。包含 NIC 的全部字段（内嵌提升），再叠加 sysfs/ip/ethtool 信息。
      properties:
        # 内嵌 NIC（提升字段）
        name: { type: string }
        mac: { type: string }
        up: { type: boolean }
        running: { type: boolean }
        speed_mb: { type: integer }
        duplex: { type: string }
        mtu: { type: integer }
        kind: { type: string, enum: [physical, bridge, vlan, wifi, virtual] }
        bound: { type: string }
        role: { type: string, enum: [lan, wan, ""] }
        rx_bytes: { type: integer }
        tx_bytes: { type: integer }
        ip_addrs:
          type: array
          items: { type: string }
        # 链路/拓扑（sysfs）
        ifindex: { type: integer }
        operstate: { type: string }
        carrier: { type: boolean }
        carrier_changes: { type: integer }
        tx_queue_len: { type: integer }
        ifalias: { type: string }
        master: { type: string }
        bridge_ports:
          type: array
          items: { type: string }
        vlan_id: { type: integer }
        vlan_proto: { type: string }
        # 驱动/链路能力（ethtool，尽力而为，可能为空）
        driver: { type: string }
        driver_version: { type: string }
        firmware: { type: string }
        bus_info: { type: string }
        perm_mac: { type: string }
        autoneg: { type: string, enum: [on, off, ""] }
        port: { type: string }
        supported_modes:
          type: array
          items: { type: string }
        advertised_modes:
          type: array
          items: { type: string }
        stats: { $ref: "#/components/schemas/NICStats" }
        addrs:
          type: array
          items: { $ref: "#/components/schemas/NICAddr" }
    NetOverview:
      type: object
      properties:
        wan_count: { type: integer }
        wan_up: { type: integer }
        connections: { type: integer }
        lan_count: { type: integer }
        lan_up: { type: integer }
        dhcp_on: { type: integer }
        terminals: { type: integer }
        free_ports: { type: integer }
        wans:
          type: array
          items: { $ref: "#/components/schemas/NetIface" }
        lans:
          type: array
          items: { $ref: "#/components/schemas/NetIface" }
