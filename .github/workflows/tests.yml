name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # web/web.go 用 //go:embed dist，缺 dist 时 vet/test/build 全部会失败
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web/dist
        run: |
          cd web
          npm ci --no-audit --no-fund --legacy-peer-deps
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: build (linux/amd64 static)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o bin/kwrtmgrd ./cmd/kwrtmgrd
          file bin/kwrtmgrd

      - name: smoke run --version
        run: ./bin/kwrtmgrd version

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: kwrtmgrd-linux-amd64
          path: bin/kwrtmgrd
          retention-days: 7
